name: Job Bot

on:
  schedule:
    - cron: '0 7 * * *'  # ogni giorno ore 07:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run bot
        run: python bot.py
